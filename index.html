<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        <h1>Lotto Generator</h1>
        <div class="lotto-numbers">
            <!-- Numbers will be generated here -->
        </div>
        <button id="generator-btn">Generate Numbers</button>
    </div>

    <div class="container partnership-section">
        <h2>Partnership Inquiry</h2>
        <p>Interested in working together? Send us a message!</p>
        <form action="https://formspree.io/f/xgopbnlb" method="POST" class="inquiry-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="Your Message" rows="4" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Message</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
